services:
  postgres:
    image: postgres:16-alpine
    container_name: topics-members-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: topics_members
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - topics_members_data:/var/lib/postgresql/data

volumes:
  topics_members_data:
